<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina non trovata — Praxisy</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="praxisy.css">
<style>
  .notfound { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px var(--gutter); }
  .notfound .code { font-family: var(--mono); font-size: clamp(3.5rem,10vw,6rem); font-weight: 700; color: var(--green); letter-spacing: -0.04em; line-height: 1; }
  .notfound h1 { margin-top: 0.3em; font-size: clamp(1.5rem,3vw,2.1rem); }
  .notfound p { margin-top: 0.8em; color: var(--ink-3); max-width: 46ch; }
  .notfound .actions { margin-top: 2em; display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<div class="notfound">
  <span class="code">404</span>
  <h1>Questa pagina non esiste.</h1>
  <p>Il link seguito non corrisponde a nessuna pagina di praxisy.info. Puoi tornare alla home o provare la demo live della piattaforma.</p>
  <div class="actions">
    <a href="index.html" class="btn btn-primary">◈ Torna alla home</a>
    <a href="https://praxisy.org" target="_blank" class="btn btn-ghost">▶ Prova la demo</a>
  </div>
</div>
</body>
</html>
